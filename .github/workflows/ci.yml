name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # ubuntu gives us modern bash; macOS gives us the stock bash 3.2 the
        # engine explicitly targets (tests invoke /bin/bash for that path).
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install jq (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Install jq (macOS)
        if: runner.os == 'macOS'
        run: brew install jq

      - name: Versions
        run: |
          bash --version | head -1
          /bin/bash --version | head -1
          jq --version

      - name: Syntax check
        run: |
          for f in automatic-rename.sh naming.sh shell/hook.bash; do
            /bin/bash -n "$f"
          done

      - name: Run tests
        run: ./tests/run.sh
